$schema: 'http://json-schema.org/draft-07/schema#'
type: object
properties:
  version:
    type: string
    enum:
      - v0.1
      - v0.1.0
      - 0.1-beta
      - 0.2.0
      - v0.3.0
      - v0.4.0

  agents:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
      additionalProperties: false
      required:
        - id
        - url
  filters:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        type:
          type: string
          enum:
            - mcp
            - http
        transport:
          type: string
          enum:
            - streamable-http
        tool:
          type: string
      additionalProperties: false
      required:
        - id
        - url
  listeners:
    oneOf:
      - type: array
        additionalProperties: false
        items:
          type: object
          properties:
            name:
              type: string
            port:
              type: integer
            address:
              type: string
            timeout:
              type: string
            router:
              type: string
              enum:
                - plano_orchestrator_v1
            max_retries:
              type: integer
            type:
              type: string
              enum:
                - model
                - prompt
                - agent
            agents:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                  description:
                    type: string
                  default:
                    type: boolean
                  input_filters:
                    type: array
                    items:
                      type: string
                additionalProperties: false
                required:
                  - id
                  - description
            input_filters:
              type: array
              items:
                type: string
            output_filters:
              type: array
              items:
                type: string
          additionalProperties: false
          required:
            - type
            - name
      - type: object # deprecated legacy format, use list format instead
        additionalProperties: false
        properties:
          ingress_traffic:
            type: object
            properties:
              address:
                type: string
              port:
                type: integer
              message_format:
                type: string
                enum:
                  - openai
              timeout:
                type: string
            additionalProperties: false
          egress_traffic:
            type: object
            properties:
              address:
                type: string
              port:
                type: integer
              message_format:
                type: string
                enum:
                  - openai
              timeout:
                type: string
            additionalProperties: false
  endpoints:
    type: object
    patternProperties:
      '^[a-zA-Z][a-zA-Z0-9_]*$':
        type: object
        properties:
          endpoint:
            type: string
            pattern: '^.*$'
          connect_timeout:
            type: string
          protocol:
            type: string
            enum:
              - http
              - https
          http_host:
            type: string
        additionalProperties: false
        required:
          - endpoint

  model_providers:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        access_key:
          type: string
        model:
          type: string
        default:
          type: boolean
        base_url:
          type: string
        passthrough_auth:
          type: boolean
          description: "When true, forwards the client's Authorization header to upstream instead of using the configured access_key. Useful for routing to services like LiteLLM that validate their own virtual keys."
        http_host:
          type: string
        provider_interface:
          type: string
          enum:
            - plano
            - claude
            - deepseek
            - groq
            - mistral
            - openai
            - xiaomi
            - gemini
            - chatgpt
            - digitalocean
            - vercel
            - openrouter
        headers:
          type: object
          additionalProperties:
            type: string
          description: "Additional headers to send with upstream requests (e.g., ChatGPT-Account-Id, originator)."
        routing_preferences:
          type: array
          description: "[DEPRECATED] Inline routing_preferences under a model_provider are auto-migrated to the top-level routing_preferences list by the config generator. New configs should declare routing_preferences at the top level with an explicit models: [...] list. See docs/routing-api.md."
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
          additionalProperties: false
          required:
            - name
            - description
        retry_policy:
          type: object
          description: "Retry policy configuration. When not specified, no retry logic is enabled."
          properties:
            fallback_models:
              type: array
              description: "Ordered list of model identifiers to fallback to before using Provider_List."
              items:
                type: string
            default_strategy:
              type: string
              description: "Default retry strategy for unconfigured status codes. Default: different_provider."
              enum:
                - same_model
                - same_provider
                - different_provider
            default_max_attempts:
              type: integer
              description: "Default max retry attempts for unconfigured status codes. Default: 2."
              minimum: 0
            on_status_codes:
              type: array
              description: "Per-status-code retry configuration."
              items:
                type: object
                properties:
                  codes:
                    type: array
                    description: "List of status codes as integers or range strings (e.g. '502-504')."
                    items:
                      anyOf:
                        - type: integer
                          minimum: 100
                          maximum: 599
                        - type: string
                          description: "Range string in 'start-end' format (e.g. '502-504')."
                  strategy:
                    type: string
                    description: "Retry strategy for these status codes."
                    enum:
                      - same_model
                      - same_provider
                      - different_provider
                  max_attempts:
                    type: integer
                    description: "Max retry attempts for these status codes."
                    minimum: 0
                additionalProperties: false
                required:
                  - codes
                  - strategy
                  - max_attempts
            on_timeout:
              type: object
              description: "Timeout-specific retry configuration. When omitted, timeouts use default_strategy and default_max_attempts."
              properties:
                strategy:
                  type: string
                  description: "Retry strategy for timeout errors."
                  enum:
                    - same_model
                    - same_provider
                    - different_provider
                max_attempts:
                  type: integer
                  description: "Max retry attempts for timeout errors."
                  minimum: 1
              additionalProperties: false
              required:
                - strategy
                - max_attempts
            on_high_latency:
              type: object
              description: "High latency proactive failover configuration. When omitted, no latency-based failover is performed."
              properties:
                threshold_ms:
                  type: integer
                  description: "Latency threshold in milliseconds. When response time exceeds this value, a High_Latency_Event is triggered."
                  minimum: 1
                measure:
                  type: string
                  description: "What latency metric to measure. Default: ttfb."
                  enum:
                    - ttfb
                    - total
                strategy:
                  type: string
                  description: "Retry strategy when latency threshold is exceeded."
                  enum:
                    - same_model
                    - same_provider
                    - different_provider
                max_attempts:
                  type: integer
                  description: "Max retry attempts when latency threshold is exceeded."
                  minimum: 1
                block_duration_seconds:
                  type: integer
                  description: "How long to block the model/provider after detecting high latency, in seconds. Default: 300."
                  minimum: 1
                scope:
                  type: string
                  description: "What to block: model-level or provider-level. Default: model."
                  enum:
                    - model
                    - provider
                apply_to:
                  type: string
                  description: "Blocking scope: global or request-scoped. Default: global."
                  enum:
                    - global
                    - request
                min_triggers:
                  type: integer
                  description: "Number of High_Latency_Events required before creating a block. Default: 1."
                  minimum: 1
                trigger_window_seconds:
                  type: integer
                  description: "Sliding time window in seconds for counting triggers. Required when min_triggers > 1."
                  minimum: 1
              additionalProperties: false
              required:
                - threshold_ms
                - strategy
                - max_attempts
                - block_duration_seconds
            backoff:
              type: object
              description: "Exponential backoff configuration. When omitted, no backoff delays are applied."
              properties:
                apply_to:
                  type: string
                  description: "REQUIRED. Determines when backoff delays are applied."
                  enum:
                    - same_model
                    - same_provider
                    - global
                base_ms:
                  type: integer
                  description: "Base delay in milliseconds for exponential backoff. Default: 100."
                  minimum: 1
                max_ms:
                  type: integer
                  description: "Maximum delay in milliseconds for exponential backoff. Default: 5000."
                  minimum: 1
                jitter:
                  type: boolean
                  description: "Add random jitter to prevent thundering herd. Default: true."
              additionalProperties: false
              required:
                - apply_to
            retry_after_handling:
              type: object
              description: "Retry-After header handling customization. When omitted, Retry-After is honored with defaults (scope: model, apply_to: global, max_retry_after_seconds: 300)."
              properties:
                scope:
                  type: string
                  description: "What to block: model-level or provider-level. Default: model."
                  enum:
                    - model
                    - provider
                apply_to:
                  type: string
                  description: "Blocking scope: request-scoped or global. Default: global."
                  enum:
                    - request
                    - global
                max_retry_after_seconds:
                  type: integer
                  description: "Maximum Retry-After value honored in seconds. Default: 300."
                  minimum: 1
              additionalProperties: false
            max_retry_duration_ms:
              type: integer
              description: "Maximum total time in milliseconds for all retry attempts combined. Timer starts on first retry."
              minimum: 0
          additionalProperties: false
      additionalProperties: false
      required:
        - model

  llm_providers: # deprecated for legacy support, use model_providers instead
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        access_key:
          type: string
        model:
          type: string
        default:
          type: boolean
        base_url:
          type: string
        passthrough_auth:
          type: boolean
          description: "When true, forwards the client's Authorization header to upstream instead of using the configured access_key. Useful for routing to services like LiteLLM that validate their own virtual keys."
        http_host:
          type: string
        provider_interface:
          type: string
          enum:
            - plano
            - claude
            - deepseek
            - groq
            - mistral
            - openai
            - xiaomi
            - gemini
            - chatgpt
            - digitalocean
            - vercel
            - openrouter
        headers:
          type: object
          additionalProperties:
            type: string
          description: "Additional headers to send with upstream requests (e.g., ChatGPT-Account-Id, originator)."
        routing_preferences:
          type: array
          description: "[DEPRECATED] Inline routing_preferences under an llm_provider are auto-migrated to the top-level routing_preferences list by the config generator. New configs should declare routing_preferences at the top level with an explicit models: [...] list. See docs/routing-api.md."
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
          additionalProperties: false
          required:
            - name
            - description
        retry_policy:
          type: object
          description: "Retry policy configuration. When not specified, no retry logic is enabled."
          properties:
            fallback_models:
              type: array
              description: "Ordered list of model identifiers to fallback to before using Provider_List."
              items:
                type: string
            default_strategy:
              type: string
              description: "Default retry strategy for unconfigured status codes. Default: different_provider."
              enum:
                - same_model
                - same_provider
                - different_provider
            default_max_attempts:
              type: integer
              description: "Default max retry attempts for unconfigured status codes. Default: 2."
              minimum: 0
            on_status_codes:
              type: array
              description: "Per-status-code retry configuration."
              items:
                type: object
                properties:
                  codes:
                    type: array
                    description: "List of status codes as integers or range strings (e.g. '502-504')."
                    items:
                      anyOf:
                        - type: integer
                          minimum: 100
                          maximum: 599
                        - type: string
                          description: "Range string in 'start-end' format (e.g. '502-504')."
                  strategy:
                    type: string
                    description: "Retry strategy for these status codes."
                    enum:
                      - same_model
                      - same_provider
                      - different_provider
                  max_attempts:
                    type: integer
                    description: "Max retry attempts for these status codes."
                    minimum: 0
                additionalProperties: false
                required:
                  - codes
                  - strategy
                  - max_attempts
            on_timeout:
              type: object
              description: "Timeout-specific retry configuration. When omitted, timeouts use default_strategy and default_max_attempts."
              properties:
                strategy:
                  type: string
                  description: "Retry strategy for timeout errors."
                  enum:
