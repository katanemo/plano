# Auto-load the brightstaff dashboard JSON on Grafana startup.

apiVersion: 1

providers:
  - name: brightstaff
    orgId: 1
    folder: Plano
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
