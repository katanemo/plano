version: v0.3.0

listeners:
  - type: model
    name: model_listener
    port: 12000

model_providers:
  - model: openai/gpt-4o
    base_url: http://host.docker.internal:${MOCK_PRIMARY_PORT}
    access_key: test-key-primary
    default: true
    retry_policy:
      default_strategy: "same_model"
      default_max_attempts: 2
      on_status_codes:
        - codes: [429]
          strategy: "same_model"
          max_attempts: 2
      retry_after_handling:
        scope: "model"
        apply_to: "request"
        max_retry_after_seconds: 300
