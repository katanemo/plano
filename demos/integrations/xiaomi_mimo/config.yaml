version: v0.3.0

listeners:
  - type: model
    name: mimo_model_listener
    address: 0.0.0.0
    port: 12000
    max_retries: 3

model_providers:
  - model: xiaomi/mimo-v2-pro
    access_key: $MIMO_API_KEY
    default: true

system_prompt: |
  You are MiMo, an AI assistant developed by Xiaomi.

tracing:
  random_sampling: 100
