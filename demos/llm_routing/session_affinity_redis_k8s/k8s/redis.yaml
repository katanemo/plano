---
# Redis StatefulSet — single-shard, persistence enabled.
# For production, replace with Redis Cluster or a managed service (ElastiCache, MemoryStore, etc.).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: plano-demo
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "320Mi"
              cpu: "500m"
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# Stable DNS name: redis.plano-demo.svc.cluster.local:6379
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: plano-demo
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  clusterIP: None  # headless — StatefulSet pods get stable DNS
---
# Regular ClusterIP for application code (redis://redis:6379)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: plano-demo
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
