version: v0.3.0

listeners:
  - type: model
    name: model_listener
    port: 12000

model_providers:

  - model: openai/gpt-4o-mini
    access_key: $OPENAI_API_KEY
    default: true

  - model: openai/gpt-4o
    access_key: $OPENAI_API_KEY
    routing_preferences:
      - name: code understanding
        description: understand and explain existing code snippets, functions, or libraries

  - model: anthropic/claude-sonnet-4-6
    access_key: $ANTHROPIC_API_KEY
    routing_preferences:
      - name: code generation
        description: generating new code snippets, functions, or boilerplate based on user prompts or requirements

# Per-model pricing is required for session stickiness: the switch-cost
# calculation needs each model's input and cached-input rates.
model_metrics_sources:
  - type: cost
    provider: models.dev
    refresh_interval: 86400

# Automatic prompt caching (opt-in). Keeps a conversation pinned to the same
# model so the upstream provider's prompt cache stays warm across turns, and
# auto-injects cache-control markers where the provider needs them.
prompt_caching:
  enabled: true

  # Session stickiness with a cumulative per-session switch budget. The default
  # posture is to stick to the warm model. When routing proposes a *different*
  # model while the session's provider cache is plausibly still warm (inferred
  # from how long ago the session was last used vs. the provider's cache window),
  # the input-cost of abandoning the cache:
  #
  #   switch_cost = context_tokens x (candidate_uncached_input - anchor_cached_input)
  #
  # is drawn from the session's switch budget. A paid switch is allowed only while
  # budget remains; an outright-cheaper switch is free and credits the budget back.
  # The budget is yours to define -- Plano never invents one, and startup fails if
  # stickiness is enabled without a switch_budget (or without a cost source).
  session_stickiness:
    enabled: true

    # Cumulative budget (USD) for quality-driven switches over a session. 0 means
    # "never pay to switch"; larger values buy more switches before sticking.
    switch_budget:
      seed_usd: 0.50
      # Re-seed the budget when a cold session re-binds (new warm episode). Default true.
      # replenish_on_rebind: true
      # Credit the budget back on outright-cheaper (negative-cost) switches. Default true.
      # credit_negative: true

    # Fallback used only when the pricing feed doesn't publish a cached-read
    # rate for a model: cached_rate = input_rate x cache_read_discount.
    # A pricing detail, not a cost policy. Default 0.1.
    # cache_read_discount: 0.1

    # Record the route the gate WOULD have taken when it vetoes a switch, as the
    # `plano.switch.counterfactual_route` trace attribute. Telemetry only -- the
    # counterfactual model is never dispatched. Handy for evals that want to
    # measure the road not taken. Default false.
    record_counterfactual: true

tracing:
  random_sampling: 100
