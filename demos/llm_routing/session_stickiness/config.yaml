version: v0.3.0

listeners:
  - type: model
    name: model_listener
    port: 12000

model_providers:

  - model: openai/gpt-4o-mini
    access_key: $OPENAI_API_KEY
    default: true

  - model: openai/gpt-4o
    access_key: $OPENAI_API_KEY
    routing_preferences:
      - name: code understanding
        description: understand and explain existing code snippets, functions, or libraries

  - model: anthropic/claude-sonnet-4-6
    access_key: $ANTHROPIC_API_KEY
    routing_preferences:
      - name: code generation
        description: generating new code snippets, functions, or boilerplate based on user prompts or requirements

# Per-model pricing is required for the session-stickiness cost gate: the regret
# calculation needs each model's input and cached-input rates.
model_metrics_sources:
  - type: cost
    provider: models.dev
    refresh_interval: 86400

# Automatic prompt caching (opt-in). Keeps a conversation pinned to the same
# model so the upstream provider's prompt cache stays warm across turns, and
# auto-injects cache-control markers where the provider needs them.
prompt_caching:
  enabled: true

  # Cache-regret cost gate on session re-routes. When a re-route is being
  # considered (expired pin) and the previous model's cache is plausibly still
  # warm, only switch models if the input-cost regret of abandoning the cache:
  #
  #   regret = context_tokens x (candidate_uncached_input - previous_cached_input)
  #
  # stays within your switch_cost threshold. Negative regret (the candidate is
  # cheaper on input than the warm model's cached rate) always switches. The
  # threshold is yours to define -- Plano never invents one, and startup fails
  # if the gate is enabled without a switch_cost.
  session_stickiness:
    enabled: true

    # Form 1: absolute ceiling -- "never pay more than $0.10 of cache regret
    # for a single switch."
    switch_cost:
      type: max_regret_usd
      value: 0.10

    # Form 2 (alternative): relative ceiling -- "allow a switch only if the
    # regret is at most 200% of what staying on the warm model would cost."
    # Scales automatically with context size.
    #
    # switch_cost:
    #   type: max_regret_pct_of_cached
    #   value: 200

    # Fallback used only when the pricing feed doesn't publish a cached-read
    # rate for a model: cached_rate = input_rate x cache_read_discount.
    # A pricing detail, not a cost policy. Default 0.1.
    # cache_read_discount: 0.1

tracing:
  random_sampling: 100
