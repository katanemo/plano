services:
  content-guard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10500:10500"
  fake-provider:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "fake_provider:app", "--host", "0.0.0.0", "--port", "10501"]
    ports:
      - "10501:10501"
  output-filter:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "output_filter:app", "--host", "0.0.0.0", "--port", "10502"]
    ports:
      - "10502:10502"
  plano:
    build:
      context: ../../../
      dockerfile: Dockerfile
    ports:
      - "12000:12000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ${PLANO_CONFIG_FILE:-./config.yaml}:/app/plano_config.yaml
      - /etc/ssl/cert.pem:/etc/ssl/cert.pem
    depends_on:
      - content-guard
      - fake-provider
      - output-filter
  jaeger:
    build:
      context: ../../shared/jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
